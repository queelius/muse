# Hand-picked recommended models surfaced in `muse models list`.
#
# Adding entries:
#   - `id` is the catalog key. Kebab-case. This is what the user types
#     in `muse pull <id>` and what shows up in `muse models list`.
#   - Either `uri` (resolver-pulled) OR `bundled: true` (alias to a
#     bundled script with the same id).
#   - For URI entries: also set `modality`, `size_gb`, `description`.
#     For bundled entries: leave the rest empty; metadata comes from
#     the script's MANIFEST.
#   - Optional `capabilities:` mapping (URI entries only): runtime-specific
#     overrides (e.g. `trust_remote_code: true`, `chat_format`,
#     `context_length`) that merge into the resolver-synthesized manifest
#     at pull time. Overlay wins on collision.
#   - Curation taste: keep the list small. New users should be able to
#     scan it in seconds and pick something. ~10-20 entries total.
#
# Pulling: `muse pull <id>` resolves a curated id to its URI (resolver
# entries) or directly invokes the bundled-script flow.
#
# Repo choices: we point at community-published GGUFs from well-known
# repackagers (unsloth, bartowski, lmstudio-community) rather than at
# official model publisher accounts, because GGUFs are rarely published
# by the model authors themselves. Unsloth and bartowski are the two
# most consistently-available upstreams; lmstudio-community is also
# well-maintained.

# ---------- chat/completion (GGUF via llama-cpp-python) ----------

- id: qwen3.5-4b-q4
  uri: hf://unsloth/Qwen3.5-4B-GGUF@q4_k_m
  modality: chat/completion
  size_gb: 2.5
  description: "Qwen3.5 4B (Q4_K_M): small but capable, runs on 4GB+ GPU or CPU"
  capabilities:
    memory_gb: 3.5

- id: llama-3.2-3b-q4
  uri: hf://bartowski/Llama-3.2-3B-Instruct-GGUF@q4_k_m
  modality: chat/completion
  size_gb: 2.0
  description: "Llama 3.2 3B Instruct (Q4_K_M): small, fast, broadly compatible"
  capabilities:
    memory_gb: 2.5

