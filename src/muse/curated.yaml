# ===== 3D generation =====
#
# v0.41.0 ships TripoSR as the bundled image-to-3d default. Curated
# entries below cover larger / dual-direction models. Note: the v0.41.0
# HF resolver routes ALL 3D-tagged repos through TripoSRRuntime; the
# entries below carry hf_repo + capability flags but their dedicated
# runtime classes (TRELLIS, Hunyuan3D-2, etc.) ship in v0.41.x. Pulling
# any of these today downloads the weights and registers a placeholder
# runtime; calling /v1/3d/* against them will route through TripoSRRuntime
# which may or may not work depending on the repo's safetensors layout.
# This is a deliberate trade-off: ship the protocol + a working bundled
# default in v0.41.0, fill in dedicated runtimes incrementally.

